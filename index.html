<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Nudge — a tiny dosage of action</title>
<script>
  /* resolve theme before first paint to avoid a flash of the wrong mode */
  (function () {
    try {
      var stored = localStorage.getItem('nudge-theme');
      var dark = stored ? stored === 'dark'
                        : window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    } catch (e) {}
  })();
</script>
<style>
  @font-face {
    font-family: 'Averia Sans Libre';
    src: url('AveriaSansLibre-Bold.ttf') format('truetype');
    font-weight: 100 900;          /* one bold file covers every requested weight */
    font-style: normal;
    font-display: swap;
  }
  :root {
    --font-display: 'Averia Sans Libre', Georgia, serif;
    --ink: #073b54;
    --ink-soft: #1d5e7e;
    --ink-faint: #4a87a3;
    --glass-line: rgba(255, 255, 255, 0.55);
    --sh: 12, 124, 178;            /* subtle aqua shadow tint (use as rgba(var(--sh), a)) */
    --radius-lg: 30px;
    --radius-md: 20px;
    --radius-sm: 16px;
    /* springy easing */
    --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    --ease: cubic-bezier(0.22, 1, 0.36, 1);

    /* ---- themed surfaces (overridden by [data-theme="dark"]) ---- */
    --bg-fallback: #2fb6df;
    --wash-grad: radial-gradient(120% 90% at 50% 30%, rgba(255,255,255,0.18), rgba(255,255,255,0) 55%);
    --card-bg: linear-gradient(160deg, rgba(255,255,255,0.5), rgba(222,244,255,0.34));
    --card-gloss: linear-gradient(180deg, rgba(255,255,255,0.4), rgba(255,255,255,0) 32%);
    --glass-bg: rgba(255,255,255,0.16);
    --glass-bg-hover: rgba(255,255,255,0.26);
    --glass-hi: rgba(255,255,255,0.7);
    --field-bg: rgba(255,255,255,0.4);
    --field-bg-focus: rgba(255,255,255,0.6);
    --field-line: rgba(255,255,255,0.6);
    --accent: #0a6fa0;
    --dose-col: #0a5577;
    --ghost-col: #0a5f88;
    --ring-track: rgba(255,255,255,0.4);
    --now-bg: rgba(255,255,255,0.4);
    --btn-bg: rgba(24, 124, 218, 0.40);
    --btn-bg-hover: rgba(28, 134, 230, 0.52);
  }

  /* ---- night-pool dark theme ---- */
  :root[data-theme="dark"] {
    --ink: #e6f1fb;
    --ink-soft: #a9cde4;
    --ink-faint: #6f9db8;
    --glass-line: rgba(255, 255, 255, 0.16);
    --sh: 0, 8, 20;
    --bg-fallback: #081521;
    --wash-grad: radial-gradient(120% 90% at 50% 16%, rgba(150,200,255,0.10), rgba(255,255,255,0) 55%);
    --card-bg: linear-gradient(160deg, rgba(34,58,82,0.55), rgba(13,27,43,0.42));
    --card-gloss: linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0) 32%);
    --glass-bg: rgba(255,255,255,0.07);
    --glass-bg-hover: rgba(255,255,255,0.13);
    --glass-hi: rgba(255,255,255,0.35);
    --field-bg: rgba(255,255,255,0.06);
    --field-bg-focus: rgba(255,255,255,0.12);
    --field-line: rgba(255,255,255,0.18);
    --accent: #5fb8e8;
    --dose-col: #c2e3f5;
    --ghost-col: #8fc2e0;
    --ring-track: rgba(255,255,255,0.14);
    --now-bg: rgba(255,255,255,0.06);
    --btn-bg: rgba(40, 120, 210, 0.45);
    --btn-bg-hover: rgba(56, 140, 230, 0.60);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    font-family: var(--font-display);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;            /* robust against mobile browser chrome */
    padding: 24px;
    /* respect notches / rounded corners on mobile */
    padding-top: max(24px, env(safe-area-inset-top));
    padding-right: max(24px, env(safe-area-inset-right));
    padding-bottom: max(24px, env(safe-area-inset-bottom));
    padding-left: max(24px, env(safe-area-inset-left));
    position: relative;
    overflow: hidden;
    background: var(--bg-fallback); /* fallback while WebGL boots */
    transition: background 0.5s var(--ease);
  }

  /* ---- pool background canvas ---- */
  #pool {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    display: block;
  }
  /* a soft brightening wash so glass reads well over the water */
  .wash {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: var(--wash-grad);
  }

  /* ============ liquid glass card ============ */
  .card {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 460px;
    padding: 46px 40px;
    text-align: center;
    border-radius: var(--radius-lg);
    background: var(--card-bg);
    border: 0.5px solid var(--glass-line);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.6),
      0 18px 48px rgba(var(--sh), 0.22);
    -webkit-backdrop-filter: blur(14px) saturate(150%);
    backdrop-filter: blur(14px) saturate(150%);
    overflow: visible;     /* let dragged buttons fling out over the pool */
  }
  .card::after { /* fine top gloss — clipped to the rounded card */
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: var(--card-gloss);
    pointer-events: none;
  }

  /* ============ link to the secondary page ============ */
  .extra-link {
    position: fixed;
    left: 50%;
    bottom: max(20px, env(safe-area-inset-bottom));
    transform: translateX(-50%);
    z-index: 5;
    display: inline-flex;
    align-items: center;
    gap: 9px;
    max-width: calc(100vw - 32px);
    padding: 11px 18px;
    border-radius: 999px;
    text-decoration: none;
    color: var(--ink);
    font-family: var(--font-display);
    font-size: 14px;
    border: 0.5px solid var(--glass-line);
    background: var(--glass-bg);
    box-shadow: 0 10px 28px rgba(var(--sh), 0.20);
    -webkit-backdrop-filter: blur(12px) saturate(150%);
    backdrop-filter: blur(12px) saturate(150%);
    transition: transform 0.3s var(--spring), background 0.25s var(--ease), box-shadow 0.25s var(--ease);
  }
  .extra-link:hover { background: var(--glass-bg-hover); transform: translateX(-50%) translateY(-2px); }
  .extra-link:active { transform: translateX(-50%) scale(0.96); }
  .extra-link .el-emoji { font-size: 16px; line-height: 1; }
  .extra-link .el-text {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .extra-link .el-arrow {
    width: 16px; height: 16px; flex: none;
    stroke: var(--accent);
    transition: transform 0.25s var(--ease);
  }
  .extra-link:hover .el-arrow { transform: translateX(3px); }

  /* ============ mascot ============ */
  #mascot {
    position: absolute;
    top: -104px;
    left: 50%;
    margin-left: -64px;
    width: 128px;
    height: 134px;
    z-index: 6;
    cursor: grab;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    will-change: transform;
  }
  #mascot:active { cursor: grabbing; }
  .mascot-inner { width: 100%; height: 100%; transform-origin: 50% 82%; }
  .mascot-inner svg {
    width: 100%; height: 100%; display: block;
    filter: drop-shadow(0 9px 14px rgba(var(--sh), 0.30));
  }
  .mascot-inner.bouncing { animation: mascotBounce 0.6s var(--ease); }
  @keyframes mascotBounce {
    0%   { transform: scale(1, 1); }
    20%  { transform: scale(1.16, 0.84); }
    45%  { transform: scale(0.9, 1.12); }
    70%  { transform: scale(1.05, 0.96); }
    100% { transform: scale(1, 1); }
  }
  .pupil { transition: transform 0.12s ease-out; }

  .eyebrow {
    font-size: 11.5px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 14px;
  }
  h1 {
    font-family: var(--font-display);
    font-size: 33px;
    line-height: 1.22;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 14px;
  }
  .sub {
    font-size: 18px;
    line-height: 1.6;
    color: var(--ink-soft);
    margin-bottom: 30px;
  }

  .panel { display: none; }
  .panel.active { display: block; animation: rise 0.5s var(--ease) both; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  textarea#task {
    width: 100%;
    border: 0.5px solid var(--field-line);
    background: var(--field-bg);
    border-radius: var(--radius-md);
    padding: 20px 22px;
    font: inherit;
    font-size: 23px;
    color: var(--ink);
    resize: none;
    line-height: 1.4;
    box-shadow: inset 0 2px 6px rgba(var(--sh),0.12);
    transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease), background 0.2s;
    margin-bottom: 28px;
  }
  textarea#task:focus {
    outline: none;
    border-color: #4fc3f7;
    background: var(--field-bg-focus);
    box-shadow: inset 0 2px 6px rgba(var(--sh),0.10), 0 0 0 4px rgba(79,195,247,0.3);
  }

  .doses {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }

  /* ---- liquid glass interactive surfaces (iOS-style, restrained) ---- */
  .glass {
    position: relative;
    border: 0.5px solid var(--glass-line);
    background: var(--glass-bg);
    -webkit-backdrop-filter: blur(10px) saturate(150%);
    backdrop-filter: blur(10px) saturate(150%);
    box-shadow:
      inset 0 0.5px 0.5px var(--glass-hi),                /* crisp top edge */
      inset 0 9px 16px -12px rgba(255,255,255,0.55),       /* light pooling under the top rim */
      inset 0 -10px 16px -12px rgba(var(--sh), 0.28),      /* shadow gathering at the base */
      0 2px 10px rgba(var(--sh), 0.14);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.4s var(--spring), background 0.25s var(--ease), box-shadow 0.25s var(--ease);
  }
  .glass::before { /* hairline top highlight */
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(180deg, rgba(255,255,255,0.4), rgba(255,255,255,0) 45%);
    opacity: 0.7;
    pointer-events: none;
  }
  /* liquid-glass rim: the edge refracts the pool and splits it into a faint
     chromatic fringe — warm on one corner, cool on the opposite — the way light
     disperses through a thick glass bevel. */
  .glass::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1.6px;                  /* rim thickness (revealed by the mask below) */
    pointer-events: none;
    /* the rim re-samples the backdrop with a hue shift + extra saturation so the
       colours behind it visibly bend at the edge */
    -webkit-backdrop-filter: saturate(220%) hue-rotate(16deg) brightness(1.05);
            backdrop-filter: saturate(220%) hue-rotate(16deg) brightness(1.05);
    background:
      linear-gradient(135deg, rgba(255,150,190,0.45), rgba(255,255,255,0) 26%),
      linear-gradient(315deg, rgba(150,205,255,0.45), rgba(255,255,255,0) 26%);
    /* reveal only the border ring (full box minus the inner content box) */
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            mask-composite: exclude;
    mix-blend-mode: screen;
    opacity: 0.85;
  }
  .glass:hover {
    background: var(--glass-bg-hover);
    box-shadow:
      inset 0 0.5px 0.5px var(--glass-hi),
      inset 0 9px 16px -12px rgba(255,255,255,0.6),
      inset 0 -10px 16px -12px rgba(var(--sh), 0.30),
      0 10px 26px rgba(var(--sh), 0.24);
  }
  .glass:hover::after { opacity: 1; }   /* edge dispersion brightens on hover */
  /* transforms (tilt / drag / press) are driven by JS so they never conflict */

  /* ---- gentle, idle float (separate translate/rotate props so they compose
     cleanly with the JS-driven `transform` used for tilt/drag/press) ---- */
  .floating {
    animation:
      floatDrift var(--fd, 7s) ease-in-out var(--fdx, 0s) infinite,
      floatTilt  var(--ft, 9s) ease-in-out var(--fdr, 0s) infinite;
  }
  @keyframes floatDrift {
    0%   { translate: 0 0; }
    25%  { translate: var(--fx, 4px) calc(var(--fy, 5px) * -0.7); }
    50%  { translate: calc(var(--fx, 4px) * -0.5) var(--fy, 5px); }
    75%  { translate: calc(var(--fx, 4px) * 0.35) calc(var(--fy, 5px) * -0.35); }
    100% { translate: 0 0; }
  }
  @keyframes floatTilt {
    0%, 100% { rotate: calc(var(--fr, 1deg) * -1); }
    50%      { rotate: var(--fr, 1deg); }
  }

  .dose {
    border-radius: var(--radius-sm);
    padding: 26px 8px;
    text-align: center;
    color: var(--dose-col);
    touch-action: none; /* let pointer drag work without scrolling */
    user-select: none;
  }
  .dose .n { font-family: var(--font-display); font-size: 36px; font-weight: 700; letter-spacing: 0; }

  .btn {
    width: 100%;
    border-radius: var(--radius-md);
    padding: 17px;
    font: inherit;
    font-size: 18px;
    letter-spacing: 0.01em;
    color: #fff;
    touch-action: none;
    user-select: none;
  }
  /* primary action: subtle blue-tinted glass */
  .btn:not(.btn-ghost) {
    background: var(--btn-bg);
    border-color: var(--glass-line);
  }
  .btn:not(.btn-ghost):hover { background: var(--btn-bg-hover); }
  .btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    pointer-events: none;
  }
  .btn-ghost {
    color: var(--ghost-col);
  }

  .btn-row { display: flex; gap: 12px; }
  .btn-row .btn { flex: 1; }

  /* ---- running ---- */
  #running.tossing .ring-wrap,
  #running.tossing .whisper,
  #running.tossing .btn-row {
    transition: opacity 0.45s var(--ease), transform 0.45s var(--ease);
    opacity: 0;
    transform: translateY(6px);
    pointer-events: none;
  }
  .now-task {
    font-size: 18px;
    line-height: 1.5;
    color: var(--ink);
    background: var(--now-bg);
    border: 1px solid var(--glass-line);
    border-radius: var(--radius-md);
    padding: 16px 22px;
    margin-bottom: 30px;
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.7);
  }

  .ring-wrap { position: relative; width: 252px; height: 252px; margin: 4px auto 30px; }
  .ring-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); display: block; overflow: visible; } /* overflow visible kills the edge-clip */
  .ring-track { stroke: var(--ring-track); }
  .ring-fg { stroke: url(#ringGrad); stroke-linecap: round; filter: url(#aquaGlow); }
  .ring-center { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  .time { font-family: var(--font-display); font-size: 62px; font-weight: 700; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; }

  .whisper { font-size: 16px; color: var(--ink-soft); margin-bottom: 24px; min-height: 22px; }

  /* ---- done ---- */
  .check {
    width: 72px; height: 72px; margin: 0 auto 20px; border-radius: 50%;
    background: rgba(28, 128, 220, 0.42);
    border: 0.5px solid rgba(255,255,255,0.6);
    -webkit-backdrop-filter: blur(10px) saturate(140%);
    backdrop-filter: blur(10px) saturate(140%);
    display: flex; align-items: center; justify-content: center;
    box-shadow: inset 0 0.5px 0.5px rgba(255,255,255,0.7), 0 6px 18px rgba(var(--sh),0.22);
    animation: pop 0.6s var(--spring) both;
  }
  @keyframes pop {
    0% { transform: scale(0.4); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .check svg { width: 36px; height: 36px; stroke: #fff; }

  /* ============ theme toggle ============ */
  .theme-toggle {
    position: fixed;
    top: max(16px, env(safe-area-inset-top));
    right: max(16px, env(safe-area-inset-right));
    z-index: 10;
    width: 44px;
    height: 44px;
    padding: 0;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-soft);
    -webkit-tap-highlight-color: transparent;
    transition: background 0.25s var(--ease), box-shadow 0.25s var(--ease), color 0.5s var(--ease);
  }
  .theme-toggle svg { width: 21px; height: 21px; display: block; }
  .theme-toggle .icon-moon { display: none; }
  :root[data-theme="dark"] .theme-toggle .icon-sun { display: none; }
  :root[data-theme="dark"] .theme-toggle .icon-moon { display: block; }

  @media (max-width: 480px) {
    body { padding: 16px; }
    .card { padding: 34px 22px; max-width: 100%; }
    h1 { font-size: 28px; }
    .doses { gap: 10px; }
    .dose { padding: 24px 4px; }
    .dose .n { font-size: 32px; }
    .ring-wrap { width: min(220px, 72vw); height: min(220px, 72vw); }
    .time { font-size: 54px; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
    .floating { animation: none; translate: none; rotate: none; } /* hold still */
  }
</style>
</head>
<body>
  <canvas id="pool"></canvas>
  <div class="wash"></div>

  <button id="themeToggle" class="theme-toggle glass" type="button" aria-label="Toggle dark mode">
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="4.2"/>
      <path d="M12 2v2.5M12 19.5V22M4.2 4.2l1.8 1.8M18 18l1.8 1.8M2 12h2.5M19.5 12H22M4.2 19.8l1.8-1.8M18 6l1.8-1.8"/>
    </svg>
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 14.5A8 8 0 1 1 9.5 4a6.2 6.2 0 0 0 10.5 10.5Z"/>
    </svg>
  </button>

  <main class="card">
    <!-- ============ MASCOT ============ -->
    <div id="mascot" aria-hidden="true">
      <div class="mascot-inner">
        <svg viewBox="0 0 140 132" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="bodyGrad" cx="42%" cy="32%" r="78%">
              <stop offset="0%" stop-color="#fbfeff" />
              <stop offset="52%" stop-color="#dcf4ff" />
              <stop offset="100%" stop-color="#a6e0ff" />
            </radialGradient>
            <radialGradient id="pupilGrad" cx="40%" cy="35%" r="75%">
              <stop offset="0%" stop-color="#3aa3ec" />
              <stop offset="100%" stop-color="#1372c9" />
            </radialGradient>
          </defs>
          <!-- body -->
          <path d="M70 14 C106 14 128 40 128 76 C128 106 102 122 70 122 C38 122 12 106 12 76 C12 40 34 14 70 14 Z"
                fill="url(#bodyGrad)" />
          <!-- top gloss -->
          <ellipse cx="56" cy="40" rx="34" ry="18" fill="#ffffff" opacity="0.45" />
          <!-- eyes (sclera) -->
          <ellipse cx="55" cy="74" rx="13" ry="17" fill="#eef9ff" />
          <ellipse cx="92" cy="70" rx="12" ry="16" fill="#eef9ff" />
          <!-- pupils (these follow the cursor) -->
          <g class="pupil">
            <ellipse cx="55" cy="76" rx="6.5" ry="8.5" fill="url(#pupilGrad)" />
          </g>
          <g class="pupil">
            <ellipse cx="92" cy="72" rx="6" ry="8" fill="url(#pupilGrad)" />
          </g>
        </svg>
      </div>
    </div>

    <!-- ============ SETUP ============ -->
    <section class="panel active" id="setup">
      <textarea id="task" rows="2" maxlength="160"></textarea>

      <div class="doses" id="doses">
        <div class="dose glass" data-min="1"><div class="n">1</div></div>
        <div class="dose glass" data-min="2"><div class="n">2</div></div>
        <div class="dose glass" data-min="5"><div class="n">5</div></div>
      </div>
    </section>

    <!-- ============ RUNNING ============ -->
    <section class="panel" id="running">
      <div class="now-task" id="nowTask"></div>

      <div class="ring-wrap">
        <svg width="252" height="252" viewBox="0 0 252 252">
          <defs>
            <linearGradient id="ringGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#b6f4ff" />
              <stop offset="45%" stop-color="#3cc0f2" />
              <stop offset="100%" stop-color="#0a72d6" />
            </linearGradient>
            <filter id="aquaGlow" x="-50%" y="-50%" width="200%" height="200%">
              <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#37c6ff" flood-opacity="0.6" />
            </filter>
          </defs>
          <circle class="ring-track" cx="126" cy="126" r="104" fill="none" stroke-width="24" />
          <circle class="ring-fg" id="ringFg" cx="126" cy="126" r="104" fill="none" stroke-width="24" />
        </svg>
        <div class="ring-center">
          <div class="time" id="timeText">2:00</div>
        </div>
      </div>

      <div class="whisper" id="whisper">Just begin. Keep your hand moving.</div>

      <div class="btn-row">
        <button class="btn btn-ghost glass" id="pauseBtn">Pause</button>
        <button class="btn btn-ghost glass" id="stopBtn">I'm done</button>
      </div>
    </section>

    <!-- ============ DONE ============ -->
    <section class="panel" id="done">
      <div class="check">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
      </div>
      <h1 id="doneTitle">You started.</h1>
      <p class="sub" id="doneSub">That was the hard part. The task was never as bad as your head made it. Want to keep the momentum?</p>

      <button class="btn glass" id="moreBtn" style="margin-bottom:12px;">Keep going — 5 more minutes</button>
      <button class="btn btn-ghost glass" id="resetBtn">Start something new</button>
    </section>
  </main>

    <span class="el-emoji">🩸</span>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ====================== pool water (Three.js) ====================== */
(function () {
  const canvas = document.getElementById('pool');
  if (!window.THREE) return;

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, powerPreference: 'high-performance' });
  renderer.setPixelRatio(1); // resolution is controlled via RENDER_SCALE below, not DPR

  // Render the water at a fraction of screen resolution — caustics are soft, so
  // the downscale is invisible but cuts fragment-shader cost dramatically.
  const RENDER_SCALE = 0.62;
  const FPS = 30, FRAME_MS = 1000 / FPS;

  const scene = new THREE.Scene();
  const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

  const uniforms = {
    uTime: { value: 0 },                                // slow, scaled — drives the water
    uClock: { value: 0 },                               // real seconds — drives the splash
    uRes: { value: new THREE.Vector2(1, 1) },
    uMouse: { value: new THREE.Vector2(0.5, 0.5) },   // eased cursor, 0..1
    uSplashPos: { value: new THREE.Vector2(0.5, 0.3) },
    uSplashT: { value: -100 },                          // real-second stamp of last splash
    uDark: { value: 0 },                                // 0 = day pool, 1 = night pool (eased)
  };
  // start at the right mood so there's no day→night fade on load
  const _darkTarget = { v: document.documentElement.getAttribute('data-theme') === 'dark' ? 1 : 0 };
  uniforms.uDark.value = _darkTarget.v;

  const material = new THREE.ShaderMaterial({
    uniforms,
    vertexShader: `
      varying vec2 vUv;
      void main() { vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }
    `,
    fragmentShader: `
      precision highp float;
      varying vec2 vUv;
      uniform float uTime;
      uniform float uClock;
      uniform vec2 uRes;
      uniform vec2 uMouse;
      uniform vec2 uSplashPos;
      uniform float uSplashT;
      uniform float uDark;

      // cheap value noise — no trig, non-tiling
      float hash(vec2 p) {
        p = fract(p * vec2(127.1, 311.7));
        p += dot(p, p + 34.5);
        return fract(p.x * p.y);
      }
      float noise(vec2 p) {
        vec2 i = floor(p), f = fract(p);
        vec2 u = f * f * (3.0 - 2.0 * f);
        return mix(mix(hash(i),            hash(i + vec2(1.0, 0.0)), u.x),
                   mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), u.x), u.y);
      }
      float fbm(vec2 p) {
        float s = 0.0, a = 0.5;
        for (int i = 0; i < 3; i++) { s += a * noise(p); p = p * 2.0 + 7.0; a *= 0.5; }
        return s;
      }

      void main() {
        vec2 uv = vUv;
        float aspect = uRes.x / uRes.y;
        vec2 p = vec2(uv.x * aspect, uv.y);   // aspect-corrected (round ripples)
        vec2 m = vec2(uMouse.x * aspect, uMouse.y);
        float t = uTime;

        // ---- cursor swish: push water away from the pointer, fading with distance ----
        float md = distance(p, m);
        p += normalize(p - m + 1e-4) * 0.04 * exp(-md * 4.0);

        // ---- flowing caustic network (domain-warped noise) ----
        vec2 q = vec2(noise(p * 3.0 + vec2(0.0, t)), noise(p * 3.0 + vec2(5.0, -t)));
        float n = fbm(p * 4.5 + q * 1.6 + t * 0.5);
        float caustic = pow(clamp(1.0 - abs(n - 0.5) * 2.4, 0.0, 1.0), 4.0);
        // finer bright filaments on top for that crisp pool sparkle
        float n2 = noise(p * 9.0 - q * 2.0 - t * 0.7);
        caustic += pow(clamp(1.0 - abs(n2 - 0.5) * 3.0, 0.0, 1.0), 6.0) * 0.5;

        // ---- large slow variation so the surface never reads as tiled ----
        float vary = 0.82 + 0.36 * noise(p * 0.8 - t * 0.2);

        // day vs. night water palette
        vec3 deep    = mix(vec3(0.04, 0.42, 0.63), vec3(0.012, 0.055, 0.12), uDark);
        vec3 shallow = mix(vec3(0.28, 0.71, 0.86), vec3(0.05, 0.20, 0.34),  uDark);
        vec3 col = mix(deep, shallow, uv.y * 0.5 + 0.28) * vary;
        // caustics cool to a moonlit blue at night
        vec3 caustCol = mix(vec3(0.78, 0.94, 1.0), vec3(0.42, 0.66, 0.92), uDark);
        col += caustic * caustCol * mix(0.62, 0.52, uDark);

        // overhead light (warm sun by day, cool moon by night) + faint cursor glow
        float overhead = smoothstep(0.7, 0.0, distance(uv, vec2(0.18, 0.9)));
        col += overhead * mix(0.09, 0.07, uDark) * mix(vec3(1.0), vec3(0.62, 0.80, 1.0), uDark);
        col += smoothstep(0.16, 0.0, md) * 0.04;

        // ---- splash ripple when a task is tossed in ----
        float st = uClock - uSplashT;
        if (st > 0.0 && st < 1.8) {
          vec2 ap = vec2(uSplashPos.x * aspect, uSplashPos.y);
          float ring = smoothstep(0.05, 0.0, abs(distance(p, ap) - st * 0.45));
          float fade = 1.0 - st / 1.8;
          col += ring * fade * fade * 0.7 * mix(vec3(0.9, 1.0, 1.0), vec3(0.55, 0.78, 1.0), uDark);
        }

        col *= 0.8 + 0.12 * smoothstep(1.2, 0.3, length(uv - 0.5)); // tone down + gentle vignette
        col *= mix(1.0, 0.86, uDark);                                // night water sits a touch deeper
        gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);
      }
    `,
  });

  scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material));

  function resize() {
    const w = Math.floor(window.innerWidth * RENDER_SCALE);
    const h = Math.floor(window.innerHeight * RENDER_SCALE);
    renderer.setSize(w, h, false); // false = don't touch CSS; canvas stays 100% via stylesheet
    uniforms.uRes.value.set(w, h);
  }
  window.addEventListener('resize', resize);
  resize();

  // eased cursor — the lag is what makes the water feel like it swishes
  const targetMouse = { x: 0.5, y: 0.5 };
  window.addEventListener('pointermove', (e) => {
    targetMouse.x = e.clientX / window.innerWidth;
    targetMouse.y = 1.0 - e.clientY / window.innerHeight; // flip: uv.y points up
  }, { passive: true });

  // called by the app when a task is tossed into the pool
  window.poolSplash = (nx, ny) => {
    uniforms.uSplashPos.value.set(nx, 1.0 - ny); // expects screen-normalized coords
    uniforms.uSplashT.value = uniforms.uClock.value;
  };

  // called by the theme manager — the water eases between day and night
  window.poolSetDark = (on) => { _darkTarget.v = on ? 1 : 0; };

  let rafId = null;          // single-loop guard prevents stacked rAF loops (leak)
  let last = 0;
  const start = performance.now();

  function loop(now) {
    rafId = requestAnimationFrame(loop);
    if (now - last < FRAME_MS) return;   // throttle to FPS
    last = now;
    uniforms.uTime.value = (now - start) * 0.00026; // slow, calm water
    uniforms.uClock.value = (now - start) * 0.001;   // real seconds for the splash
    const m = uniforms.uMouse.value;
    m.x += (targetMouse.x - m.x) * 0.08;
    m.y += (targetMouse.y - m.y) * 0.08;
    uniforms.uDark.value += (_darkTarget.v - uniforms.uDark.value) * 0.06; // ease day↔night
    renderer.render(scene, camera);
  }
  function play()  { if (rafId === null) { last = 0; rafId = requestAnimationFrame(loop); } }
  function pause() { if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; } }

  document.addEventListener('visibilitychange', () => {
    document.hidden ? pause() : play();
  });

  // long-session robustness: recover if the GPU drops the WebGL context
  canvas.addEventListener('webglcontextlost', (e) => { e.preventDefault(); pause(); }, false);
  canvas.addEventListener('webglcontextrestored', () => { resize(); play(); }, false);

  play();
})();

/* ====================== app logic ====================== */
(function () {
  const panels = {
    setup: document.getElementById('setup'),
    running: document.getElementById('running'),
    done: document.getElementById('done'),
  };
  function show(name) {
    Object.values(panels).forEach(p => p.classList.remove('active'));
    void panels[name].offsetWidth;
    panels[name].classList.add('active');
  }

  const taskInput = document.getElementById('task');
  const doses = document.getElementById('doses');

  // Every button: 3D tilt on hover, squishy fling on drag (springs back),
  // press dip on tap. A real drag (>8px) cancels the upcoming click so the
  // button's action only fires on a genuine tap.
  const TAP = 8;
  function makeInteractive(el) {
    let drag = null;
    const fast = 'transform 0.12s ease, background 0.25s, box-shadow 0.25s';
    const spring = 'transform 0.6s var(--spring), background 0.25s, box-shadow 0.25s';

    el.addEventListener('pointerenter', () => { if (!drag) el.style.transition = fast; });

    el.addEventListener('pointerdown', (e) => {
      drag = { x: e.clientX, y: e.clientY, moved: 0 };
      el._noClick = false; // clear any stale suppression from a prior drag
      el.setPointerCapture(e.pointerId);
      el.style.transition = 'none';
      el.style.zIndex = '5';
      el.style.transform = 'scale(0.96)'; // press dip until a drag begins
    });

    el.addEventListener('pointermove', (e) => {
      const r = el.getBoundingClientRect();
      if (drag) {
        const dx = e.clientX - drag.x, dy = e.clientY - drag.y;
        drag.moved = Math.max(drag.moved, Math.hypot(dx, dy));
        const stretch = Math.min(drag.moved / 220, 0.18);
        el.style.transform =
          `translate(${dx}px, ${dy}px) rotate(${dx * 0.05}deg) scale(${1.06 + stretch})`;
      } else {
        const px = (e.clientX - r.left) / r.width - 0.5;
        const py = (e.clientY - r.top) / r.height - 0.5;
        el.style.transform =
          `perspective(520px) rotateY(${px * 14}deg) rotateX(${-py * 14}deg) translateZ(6px)`;
      }
    });

    const settle = () => {
      el.style.transition = spring;
      el.style.transform = '';
      setTimeout(() => { el.style.zIndex = ''; }, 600);
    };
    el.addEventListener('pointerup', () => {
      if (!drag) return;
      const moved = drag.moved; drag = null;
      if (moved >= TAP) el._noClick = true; // it was a drag → swallow the click
      settle();
    });
    el.addEventListener('pointercancel', () => { if (drag) { drag = null; settle(); } });
    el.addEventListener('pointerleave', () => { if (!drag) settle(); });

    // capture phase: cancel the click that follows a drag, before the action runs
    el.addEventListener('click', (e) => {
      if (el._noClick) { e.preventDefault(); e.stopImmediatePropagation(); el._noClick = false; }
    }, true);
  }

  // Give each surface its own gentle, never-quite-repeating float. Randomised
  // amplitudes / periods / negative start-delays mean no two buttons drift in
  // sync, so the motion reads as organic rather than mechanical.
  const rnd = (a, b) => a + Math.random() * (b - a);
  function makeFloat(el) {
    el.style.setProperty('--fx', rnd(3, 6).toFixed(1) + 'px');
    el.style.setProperty('--fy', rnd(4, 7).toFixed(1) + 'px');
    el.style.setProperty('--fr', rnd(0.5, 1.3).toFixed(2) + 'deg');
    el.style.setProperty('--fd', rnd(6, 9).toFixed(1) + 's');     // drift period
    el.style.setProperty('--ft', rnd(7.5, 11).toFixed(1) + 's');  // tilt period (different → no loop point)
    el.style.setProperty('--fdx', '-' + rnd(0, 9).toFixed(1) + 's');
    el.style.setProperty('--fdr', '-' + rnd(0, 9).toFixed(1) + 's');
    el.classList.add('floating');
  }

  doses.querySelectorAll('.dose').forEach((dose) => {
    makeInteractive(dose);
    makeFloat(dose);
    dose.addEventListener('click', () => begin(parseInt(dose.dataset.min, 10)));
  });
  // every other button gets the same interaction + float (in every state)
  ['pauseBtn', 'stopBtn', 'moreBtn', 'resetBtn'].forEach((id) => {
    const el = document.getElementById(id);
    makeInteractive(el);
    makeFloat(el);
  });

  const RADIUS = 104, CIRC = 2 * Math.PI * RADIUS;
  const ringFg = document.getElementById('ringFg');
  ringFg.style.strokeDasharray = CIRC;
  ringFg.style.strokeDashoffset = 0;

  const timeText = document.getElementById('timeText');
  const nowTask = document.getElementById('nowTask');
  const pauseBtn = document.getElementById('pauseBtn');
  const stopBtn = document.getElementById('stopBtn');
  const whisper = document.getElementById('whisper');

  const whispers = [
    "Just begin. Keep your hand moving.",
    "Small and ugly beats perfect and unstarted.",
    "You don't have to finish. Just continue.",
    "Momentum is built one minute at a time.",
    "Notice — it's lighter than you feared.",
    "Stay with it. You're already in motion.",
  ];

  // timestamp-based so a backgrounded tab can't desync — endAt is the source of truth
  let totalMs = 0, endAt = 0, pausedMs = 0, remaining = 0, tickId = null,
      paused = false, timerOn = false, wIdx = 0, wId = null;

  function fmt(s) {
    const m = Math.floor(s / 60), sec = s % 60;
    return m + ':' + String(sec).padStart(2, '0');
  }

  // animate=false snaps instantly (used on start + when returning to the tab) so
  // the ring never re-sweeps from the beginning.
  function setRing(frac, animate) {
    const off = CIRC * (1 - Math.max(0, Math.min(1, frac)));
    ringFg.style.transition = animate ? 'stroke-dashoffset 0.4s linear' : 'none';
    ringFg.style.strokeDashoffset = off;
    if (!animate) void ringFg.getBoundingClientRect(); // flush so the next tick eases
  }

  function refreshRing(animate) {
    if (!timerOn) return;
    const msLeft = Math.max(0, endAt - Date.now());
    const sec = Math.ceil(msLeft / 1000);
    if (sec !== remaining) { remaining = sec; timeText.textContent = fmt(sec); }
    setRing(totalMs ? msLeft / totalMs : 0, animate);
    if (msLeft <= 0) { timerOn = false; finish(); }
  }

  function startTimer(seconds) {
    totalMs = seconds * 1000;
    endAt = Date.now() + totalMs;
    remaining = seconds;
    paused = false;
    timerOn = true;
    pauseBtn.textContent = 'Pause';
    timeText.textContent = fmt(seconds);
    setRing(1, false);
    clearInterval(tickId);
    tickId = setInterval(() => { if (!paused) refreshRing(true); }, 250);
    cycleWhisper(true);
  }

  // re-sync the ring instantly when the tab becomes visible again
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && timerOn && !paused && panels.running.classList.contains('active')) {
      refreshRing(false);
    }
  });

  function cycleWhisper(reset) {
    clearInterval(wId);
    if (reset) wIdx = 0;
    whisper.style.opacity = 1;
    wId = setInterval(() => {
      whisper.style.transition = 'opacity 1.4s var(--ease)'; // slow, gentle fade-out
      whisper.style.opacity = 0;
      setTimeout(() => {
        wIdx = (wIdx + 1) % whispers.length;
        whisper.textContent = whispers[wIdx];
        whisper.style.transition = 'opacity 0.7s var(--ease)'; // quicker fade back in
        whisper.style.opacity = 1;
      }, 1400);
    }, 14000);
  }
  function finish() {
    timerOn = false;
    clearInterval(tickId); clearInterval(wId);
    completeTask('You started.',
      "That was the hard part. The task was never as bad as your head made it. Want to keep the momentum?");
  }

  const runningEl = document.getElementById('running');

  function completeTask(title, sub) {
    document.getElementById('doneTitle').textContent = title;
    document.getElementById('doneSub').textContent = sub;
    chime();
    runningEl.classList.add('tossing');
    tossIntoPool(() => { runningEl.classList.remove('tossing'); show('done'); });
  }

  // fling the task chip down into the water, splash, then continue
  function tossIntoPool(done) {
    const hasTask = nowTask.style.display !== 'none' && nowTask.textContent.trim();
    if (!hasTask) {
      if (window.poolSplash) window.poolSplash(0.5, 0.82);
      setTimeout(done, 380);
      return;
    }
    const rect = nowTask.getBoundingClientRect();
    const clone = nowTask.cloneNode(true);
    Object.assign(clone.style, {
      position: 'fixed', left: rect.left + 'px', top: rect.top + 'px',
      width: rect.width + 'px', margin: '0', zIndex: '50', pointerEvents: 'none',
    });
    document.body.appendChild(clone);
    nowTask.style.visibility = 'hidden';

    const landX = rect.left + rect.width / 2;
    const landY = window.innerHeight * 0.84;
    const dy = landY - (rect.top + rect.height / 2);

    const anim = clone.animate([
      { transform: 'translate(0,0) rotate(0deg) scale(1)', opacity: 1 },
      { transform: `translate(6px, ${dy * 0.5}px) rotate(9deg) scale(0.88)`, opacity: 1, offset: 0.5 },
      { transform: `translate(0px, ${dy}px) rotate(24deg) scale(0.32)`, opacity: 0 },
    ], { duration: 880, easing: 'cubic-bezier(0.45, 0, 0.55, 1)' });

    setTimeout(() => {
      if (window.poolSplash) window.poolSplash(landX / window.innerWidth, landY / window.innerHeight);
    }, 740);

    anim.onfinish = () => {
      clone.remove();
      nowTask.style.visibility = '';
      done();
    };
  }

  function begin(min) {
    const task = taskInput.value.trim();
    nowTask.textContent = task;
    nowTask.style.display = task ? '' : 'none';
    whisper.textContent = whispers[0];
    whisper.style.opacity = 1;
    show('running');
    startTimer(min * 60);
  }
  pauseBtn.addEventListener('click', () => {
    if (!timerOn) return;
    paused = !paused;
    if (paused) {
      pausedMs = endAt - Date.now();         // freeze the remaining time
    } else {
      endAt = Date.now() + Math.max(0, pausedMs); // resume from where we froze
      refreshRing(false);
    }
    pauseBtn.textContent = paused ? 'Resume' : 'Pause';
    whisper.style.transition = 'opacity 0.3s var(--ease)';
    whisper.textContent = paused ? 'Paused. Pick it back up when ready.' : whispers[wIdx];
  });
  stopBtn.addEventListener('click', () => {
    timerOn = false;
    clearInterval(tickId); clearInterval(wId);
    completeTask('You showed up.',
      "Stopping by choice is different from never starting. You broke the inertia — that counts.");
  });
  document.getElementById('moreBtn').addEventListener('click', () => {
    show('running');
    startTimer(5 * 60);
  });
  document.getElementById('resetBtn').addEventListener('click', () => {
    timerOn = false;
    clearInterval(tickId); clearInterval(wId);
    taskInput.value = '';
    show('setup');
    taskInput.focus();
  });

  let audioCtx = null; // reuse one context across completions (avoids leaking contexts)
  function chime() {
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      if (!audioCtx) audioCtx = new Ctx();
      const ctx = audioCtx;
      if (ctx.state === 'suspended') ctx.resume();
      [523.25, 659.25, 783.99].forEach((f, i) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'sine'; o.frequency.value = f;
        const t = ctx.currentTime + i * 0.14;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.18, t + 0.04);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.9);
        o.connect(g).connect(ctx.destination);
        o.start(t); o.stop(t + 1);
      });
    } catch (e) {}
  }

  taskInput.focus();
})();

/* ====================== mascot ====================== */
(function () {
  const mascot = document.getElementById('mascot');
  if (!mascot) return;
  const inner = mascot.querySelector('.mascot-inner');
  const pupils = mascot.querySelectorAll('.pupil');

  // eyes follow the cursor anywhere on screen
  window.addEventListener('pointermove', (e) => {
    const r = mascot.getBoundingClientRect();
    const cx = r.left + r.width / 2;
    const cy = r.top + r.height * 0.6;     // roughly eye level
    const dx = e.clientX - cx, dy = e.clientY - cy;
    const d = Math.hypot(dx, dy) || 1;
    const k = Math.min(5, d / 14);          // travel within the eye, capped
    const ox = (dx / d) * k, oy = (dy / d) * k;
    pupils.forEach((p) => p.setAttribute('transform', `translate(${ox.toFixed(2)} ${oy.toFixed(2)})`));
  }, { passive: true });

  function bounce() {
    inner.classList.remove('bouncing');
    void inner.offsetWidth;                 // restart the animation
    inner.classList.add('bouncing');
  }
  inner.addEventListener('animationend', () => inner.classList.remove('bouncing'));

  // drag like the buttons; a press (no drag) just makes him bounce
  let drag = null;
  mascot.addEventListener('pointerdown', (e) => {
    drag = { x: e.clientX, y: e.clientY, moved: 0 };
    mascot.setPointerCapture(e.pointerId);
    mascot.style.transition = 'none';
  });
  mascot.addEventListener('pointermove', (e) => {
    if (!drag) return;
    const dx = e.clientX - drag.x, dy = e.clientY - drag.y;
    drag.moved = Math.max(drag.moved, Math.hypot(dx, dy));
    const stretch = Math.min(drag.moved / 240, 0.15);
    mascot.style.transform =
      `translate(${dx}px, ${dy}px) rotate(${dx * 0.04}deg) scale(${1.02 + stretch})`;
  });
  const release = () => {
    if (!drag) return;
    const moved = drag.moved; drag = null;
    mascot.style.transition = 'transform 0.6s var(--spring)';
    mascot.style.transform = '';
    if (moved < 8) bounce();                // tapped, not dragged → bounce
  };
  mascot.addEventListener('pointerup', release);
  mascot.addEventListener('pointercancel', release);
})();

/* ====================== theme (day / night pool) ====================== */
(function () {
  const root = document.documentElement;
  const toggle = document.getElementById('themeToggle');
  const mq = window.matchMedia('(prefers-color-scheme: dark)');

  function apply(theme) {
    root.setAttribute('data-theme', theme);
    if (window.poolSetDark) window.poolSetDark(theme === 'dark');
  }

  // honour whatever the head script already resolved
  apply(root.getAttribute('data-theme') === 'dark' ? 'dark' : 'light');

  if (toggle) {
    toggle.addEventListener('click', () => {
      const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      try { localStorage.setItem('nudge-theme', next); } catch (e) {}
      apply(next);
    });
  }

  // follow the OS unless the user has made an explicit choice
  const onSystem = (e) => {
    let stored = null;
    try { stored = localStorage.getItem('nudge-theme'); } catch (e) {}
    if (!stored) apply(e.matches ? 'dark' : 'light');
  };
  if (mq.addEventListener) mq.addEventListener('change', onSystem);
  else if (mq.addListener) mq.addListener(onSystem);
})();
</script>
