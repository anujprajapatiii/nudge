<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Nudge — a tiny dosage of action</title>
<style>
  @font-face {
    font-family: 'Averia Sans Libre';
    src: url('AveriaSansLibre-Bold.ttf') format('truetype');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }
  :root {
    --font-display: 'Averia Sans Libre', Georgia, serif;
    --ink: #073b54;
    --ink-soft: #1d5e7e;
    --ink-faint: #4a87a3;
    --glass-line: rgba(255, 255, 255, 0.55);
    --radius-lg: 30px;
    --radius-md: 20px;
    --radius-sm: 16px;
    /* springy easing */
    --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100%;
    padding: 24px;
    position: relative;
    overflow: hidden;
    background: #2fb6df; /* fallback while WebGL boots */
  }

  /* ---- pool background canvas ---- */
  #pool {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    display: block;
  }
  /* a soft brightening wash so glass reads well over the water */
  .wash {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: radial-gradient(120% 90% at 50% 30%, rgba(255,255,255,0.18), rgba(255,255,255,0) 55%);
  }

  /* ============ liquid glass card ============ */
  .card {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 440px;
    padding: 38px 34px;
    text-align: center;
    border-radius: var(--radius-lg);
    background: linear-gradient(160deg, rgba(255,255,255,0.5), rgba(222,244,255,0.34));
    border: 0.5px solid var(--glass-line);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.6),
      0 18px 48px rgba(4, 54, 84, 0.22);
    -webkit-backdrop-filter: blur(14px) saturate(150%);
    backdrop-filter: blur(14px) saturate(150%);
    overflow: hidden;
  }
  .card::after { /* fine top gloss */
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(180deg, rgba(255,255,255,0.4), rgba(255,255,255,0) 32%);
    pointer-events: none;
  }

  .eyebrow {
    font-size: 11.5px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #0a6fa0;
    font-weight: 600;
    margin-bottom: 14px;
  }
  h1 {
    font-family: var(--font-display);
    font-size: 27px;
    line-height: 1.2;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 10px;
  }
  .sub {
    font-size: 15px;
    line-height: 1.55;
    color: var(--ink-soft);
    margin-bottom: 26px;
  }

  .panel { display: none; }
  .panel.active { display: block; animation: rise 0.5s var(--ease) both; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  textarea#task {
    width: 100%;
    border: 0.5px solid rgba(255,255,255,0.6);
    background: rgba(255,255,255,0.4);
    border-radius: var(--radius-md);
    padding: 16px 18px;
    font: inherit;
    font-size: 20px;
    font-weight: 500;
    color: var(--ink);
    resize: none;
    line-height: 1.45;
    box-shadow: inset 0 2px 6px rgba(8,80,120,0.10);
    transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease), background 0.2s;
    margin-bottom: 24px;
  }
  textarea#task:focus {
    outline: none;
    border-color: #4fc3f7;
    background: rgba(255,255,255,0.6);
    box-shadow: inset 0 2px 6px rgba(8,80,120,0.08), 0 0 0 4px rgba(79,195,247,0.3);
  }

  .doses {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  /* ---- liquid glass interactive surfaces (iOS-style, restrained) ---- */
  .glass {
    position: relative;
    border: 0.5px solid rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.16);
    -webkit-backdrop-filter: blur(10px) saturate(140%);
    backdrop-filter: blur(10px) saturate(140%);
    box-shadow:
      inset 0 0.5px 0.5px rgba(255,255,255,0.7),
      0 2px 10px rgba(4, 50, 90, 0.10);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.4s var(--spring), background 0.25s var(--ease), box-shadow 0.25s var(--ease);
  }
  .glass::before { /* hairline top highlight */
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(180deg, rgba(255,255,255,0.4), rgba(255,255,255,0) 45%);
    opacity: 0.7;
    pointer-events: none;
  }
  .glass:hover {
    transform: translateY(-1px) scale(1.015);
    background: rgba(255,255,255,0.24);
    box-shadow:
      inset 0 0.5px 0.5px rgba(255,255,255,0.8),
      0 6px 18px rgba(4, 50, 90, 0.16);
  }
  .glass:active {
    transform: scale(0.975);
    transition: transform 0.1s var(--ease), box-shadow 0.1s var(--ease);
    box-shadow: inset 0 1px 3px rgba(4, 50, 90, 0.22);
  }

  .dose {
    border-radius: var(--radius-sm);
    padding: 20px 8px;
    text-align: center;
    color: #0a5577;
    touch-action: none; /* let pointer drag work without scrolling */
    user-select: none;
  }
  .dose .n { font-family: var(--font-display); font-size: 28px; font-weight: 700; letter-spacing: 0; }

  .btn {
    width: 100%;
    border-radius: var(--radius-md);
    padding: 13px;
    font: inherit;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.01em;
    color: #fff;
  }
  /* primary action: subtle blue-tinted glass */
  .btn:not(.btn-ghost) {
    background: rgba(24, 124, 218, 0.40);
    border-color: rgba(255,255,255,0.55);
  }
  .btn:not(.btn-ghost):hover { background: rgba(28, 134, 230, 0.52); }
  .btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    pointer-events: none;
  }
  .btn-ghost {
    color: #0a5f88;
  }

  .btn-row { display: flex; gap: 12px; }
  .btn-row .btn { flex: 1; }

  /* ---- running ---- */
  #running.tossing .eyebrow,
  #running.tossing .ring-wrap,
  #running.tossing .whisper,
  #running.tossing .btn-row {
    transition: opacity 0.45s var(--ease), transform 0.45s var(--ease);
    opacity: 0;
    transform: translateY(6px);
    pointer-events: none;
  }
  .now-task {
    font-size: 15px;
    line-height: 1.5;
    color: var(--ink);
    background: rgba(255,255,255,0.4);
    border: 1px solid rgba(255,255,255,0.55);
    border-radius: var(--radius-md);
    padding: 14px 18px;
    margin-bottom: 26px;
    font-weight: 600;
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.7);
  }

  .ring-wrap { position: relative; width: 220px; height: 220px; margin: 0 auto 26px; }
  .ring-wrap svg { transform: rotate(-90deg); display: block; }
  .ring-bg { stroke: rgba(255,255,255,0.5); }
  .ring-fg { stroke: url(#ringGrad); stroke-linecap: round; transition: stroke-dashoffset 0.95s linear;
             filter: drop-shadow(0 2px 6px rgba(10,110,180,0.5)); }
  .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .time { font-family: var(--font-display); font-size: 50px; font-weight: 700; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; }
  .time-cap { font-size: 11.5px; color: var(--ink-faint); letter-spacing: 0.14em; text-transform: uppercase; margin-top: 4px; }

  .whisper { font-size: 13px; color: var(--ink-soft); margin-bottom: 22px; min-height: 18px;
             transition: opacity 0.4s var(--ease); }

  /* ---- done ---- */
  .check {
    width: 72px; height: 72px; margin: 0 auto 20px; border-radius: 50%;
    background: rgba(28, 128, 220, 0.42);
    border: 0.5px solid rgba(255,255,255,0.6);
    -webkit-backdrop-filter: blur(10px) saturate(140%);
    backdrop-filter: blur(10px) saturate(140%);
    display: flex; align-items: center; justify-content: center;
    box-shadow: inset 0 0.5px 0.5px rgba(255,255,255,0.7), 0 6px 18px rgba(4,50,90,0.18);
    animation: pop 0.6s var(--spring) both;
  }
  @keyframes pop {
    0% { transform: scale(0.4); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .check svg { width: 36px; height: 36px; stroke: #fff; }

  @media (max-width: 480px) {
    .card { padding: 30px 22px; }
    h1 { font-size: 23px; }
    .ring-wrap { width: 190px; height: 190px; }
    .time { font-size: 42px; }
  }
</style>
</head>
<body>
  <canvas id="pool"></canvas>
  <div class="wash"></div>

  <main class="card">
    <!-- ============ SETUP ============ -->
    <section class="panel active" id="setup">
      <textarea id="task" rows="2" maxlength="160"></textarea>

      <div class="doses" id="doses">
        <div class="dose glass" data-min="1"><div class="n">1</div></div>
        <div class="dose glass" data-min="2"><div class="n">2</div></div>
        <div class="dose glass" data-min="5"><div class="n">5</div></div>
      </div>
    </section>

    <!-- ============ RUNNING ============ -->
    <section class="panel" id="running">
      <div class="eyebrow">In progress</div>
      <div class="now-task" id="nowTask"></div>

      <div class="ring-wrap">
        <svg width="220" height="220" viewBox="0 0 220 220">
          <defs>
            <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#9be3ff" />
              <stop offset="100%" stop-color="#1283e6" />
            </linearGradient>
          </defs>
          <circle class="ring-bg" cx="110" cy="110" r="100" fill="none" stroke-width="11" />
          <circle class="ring-fg" id="ringFg" cx="110" cy="110" r="100" fill="none" stroke-width="11" />
        </svg>
        <div class="ring-center">
          <div class="time" id="timeText">2:00</div>
          <div class="time-cap">remaining</div>
        </div>
      </div>

      <div class="whisper" id="whisper">Just begin. Keep your hand moving.</div>

      <div class="btn-row">
        <button class="btn btn-ghost glass" id="pauseBtn">Pause</button>
        <button class="btn btn-ghost glass" id="stopBtn">I'm done</button>
      </div>
    </section>

    <!-- ============ DONE ============ -->
    <section class="panel" id="done">
      <div class="check">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
      </div>
      <h1 id="doneTitle">You started.</h1>
      <p class="sub" id="doneSub">That was the hard part. The task was never as bad as your head made it. Want to keep the momentum?</p>

      <button class="btn glass" id="moreBtn" style="margin-bottom:12px;">Keep going — 5 more minutes</button>
      <button class="btn btn-ghost glass" id="resetBtn">Start something new</button>
    </section>
  </main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ====================== pool water (Three.js) ====================== */
(function () {
  const canvas = document.getElementById('pool');
  if (!window.THREE) return;

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, powerPreference: 'high-performance' });
  renderer.setPixelRatio(1); // resolution is controlled via RENDER_SCALE below, not DPR

  // Render the water at a fraction of screen resolution — caustics are soft, so
  // the downscale is invisible but cuts fragment-shader cost dramatically.
  const RENDER_SCALE = 0.55;
  const FPS = 30, FRAME_MS = 1000 / FPS;

  const scene = new THREE.Scene();
  const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

  const uniforms = {
    uTime: { value: 0 },                                // slow, scaled — drives the water
    uClock: { value: 0 },                               // real seconds — drives the splash
    uRes: { value: new THREE.Vector2(1, 1) },
    uMouse: { value: new THREE.Vector2(0.5, 0.5) },   // eased cursor, 0..1
    uSplashPos: { value: new THREE.Vector2(0.5, 0.3) },
    uSplashT: { value: -100 },                          // real-second stamp of last splash
  };

  const material = new THREE.ShaderMaterial({
    uniforms,
    vertexShader: `
      varying vec2 vUv;
      void main() { vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }
    `,
    fragmentShader: `
      precision highp float;
      varying vec2 vUv;
      uniform float uTime;
      uniform float uClock;
      uniform vec2 uRes;
      uniform vec2 uMouse;
      uniform vec2 uSplashPos;
      uniform float uSplashT;

      #define TAU 6.28318530718
      #define ITER 4

      // caustic field — adapted from the classic TDM water caustics
      float caustic(vec2 uv) {
        vec2 p = mod(uv * TAU, TAU) - 250.0;
        vec2 i = vec2(p);
        float c = 1.0;
        float inten = 0.0045;
        for (int n = 0; n < ITER; n++) {
          float t = uTime * (1.0 - (3.5 / float(n + 1)));
          i = p + vec2(cos(t - i.x) + sin(t + i.y), sin(t - i.y) + cos(t + i.x));
          c += 1.0 / length(vec2(p.x / (sin(i.x + t) / inten), p.y / (cos(i.y + t) / inten)));
        }
        c /= float(ITER);
        c = 1.17 - pow(c, 1.4);
        return pow(abs(c), 8.0);
      }

      void main() {
        vec2 uv = vUv;
        float aspect = uRes.x / uRes.y;
        vec2 auv = vec2(uv.x * aspect, uv.y);   // aspect-corrected space (round ripples)
        vec2 am  = vec2(uMouse.x * aspect, uMouse.y);

        // ---- cursor swish: push the water away from the pointer, fading with distance ----
        float md = distance(auv, am);
        vec2 push = normalize(auv - am + 1e-4) * 0.05 * exp(-md * 3.5);

        float cc = caustic((auv + push) * 2.6);

        // bright pool gradient — deeper toward the bottom
        vec3 deep    = vec3(0.063, 0.51, 0.69);
        vec3 shallow = vec3(0.34, 0.80, 0.93);
        vec3 base = mix(deep, shallow, smoothstep(-0.1, 1.05, uv.y * 0.7 + 0.25));

        // caustic light network, faintly tinted toward white-cyan
        vec3 light = vec3(0.78, 0.97, 1.0);
        vec3 col = base + cc * light * 0.9;

        // a touch of sparkle from the sun in the upper-left, like the reference
        float sun = smoothstep(0.75, 0.0, distance(uv, vec2(0.18, 0.92)));
        col += sun * 0.18 * vec3(1.0, 1.0, 0.96);

        // faint brightening that trails the cursor
        col += smoothstep(0.16, 0.0, md) * 0.04;

        // ---- splash ripple when a task is tossed in ----
        float st = uClock - uSplashT;
        if (st > 0.0 && st < 1.8) {
          vec2 ap = vec2(uSplashPos.x * aspect, uSplashPos.y);
          float sd = distance(auv, ap);
          float radius = st * 0.45;                         // expanding ring
          float ring = smoothstep(0.05, 0.0, abs(sd - radius));
          float fade = 1.0 - st / 1.8;
          col += ring * fade * fade * 0.7 * vec3(0.9, 1.0, 1.0);
        }

        // gentle vignette to seat the card
        float vig = smoothstep(1.25, 0.35, length(uv - 0.5));
        col *= 0.88 + 0.12 * vig;

        gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);
      }
    `,
  });

  scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material));

  function resize() {
    const w = Math.floor(window.innerWidth * RENDER_SCALE);
    const h = Math.floor(window.innerHeight * RENDER_SCALE);
    renderer.setSize(w, h, false); // false = don't touch CSS; canvas stays 100% via stylesheet
    uniforms.uRes.value.set(w, h);
  }
  window.addEventListener('resize', resize);
  resize();

  // eased cursor — the lag is what makes the water feel like it swishes
  const targetMouse = { x: 0.5, y: 0.5 };
  window.addEventListener('pointermove', (e) => {
    targetMouse.x = e.clientX / window.innerWidth;
    targetMouse.y = 1.0 - e.clientY / window.innerHeight; // flip: uv.y points up
  }, { passive: true });

  // called by the app when a task is tossed into the pool
  window.poolSplash = (nx, ny) => {
    uniforms.uSplashPos.value.set(nx, 1.0 - ny); // expects screen-normalized coords
    uniforms.uSplashT.value = uniforms.uClock.value;
  };

  let rafId = null;          // single-loop guard prevents stacked rAF loops (leak)
  let last = 0;
  const start = performance.now();

  function loop(now) {
    rafId = requestAnimationFrame(loop);
    if (now - last < FRAME_MS) return;   // throttle to FPS
    last = now;
    uniforms.uTime.value = (now - start) * 0.00018; // slow, calm water
    uniforms.uClock.value = (now - start) * 0.001;   // real seconds for the splash
    const m = uniforms.uMouse.value;
    m.x += (targetMouse.x - m.x) * 0.08;
    m.y += (targetMouse.y - m.y) * 0.08;
    renderer.render(scene, camera);
  }
  function play()  { if (rafId === null) { last = 0; rafId = requestAnimationFrame(loop); } }
  function pause() { if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; } }

  document.addEventListener('visibilitychange', () => {
    document.hidden ? pause() : play();
  });

  // long-session robustness: recover if the GPU drops the WebGL context
  canvas.addEventListener('webglcontextlost', (e) => { e.preventDefault(); pause(); }, false);
  canvas.addEventListener('webglcontextrestored', () => { resize(); play(); }, false);

  play();
})();

/* ====================== app logic ====================== */
(function () {
  const panels = {
    setup: document.getElementById('setup'),
    running: document.getElementById('running'),
    done: document.getElementById('done'),
  };
  function show(name) {
    Object.values(panels).forEach(p => p.classList.remove('active'));
    void panels[name].offsetWidth;
    panels[name].classList.add('active');
  }

  const taskInput = document.getElementById('task');
  const doses = document.getElementById('doses');

  // squishy drag: grab a button, fling it around, release → springs back.
  // A tiny movement counts as a tap and starts that timer.
  let drag = null;
  doses.querySelectorAll('.dose').forEach((dose) => {
    dose.addEventListener('pointerdown', (e) => {
      drag = { el: dose, x: e.clientX, y: e.clientY, moved: 0, min: parseInt(dose.dataset.min, 10) };
      dose.setPointerCapture(e.pointerId);
      dose.style.transition = 'none';
      dose.style.zIndex = '3';
    });
    dose.addEventListener('pointermove', (e) => {
      if (!drag || drag.el !== dose) return;
      const dx = e.clientX - drag.x, dy = e.clientY - drag.y;
      drag.moved = Math.max(drag.moved, Math.hypot(dx, dy));
      const stretch = Math.min(drag.moved / 220, 0.16); // squish grows as you pull
      dose.style.transform =
        `translate(${dx}px, ${dy}px) rotate(${dx * 0.04}deg) scale(${1.05 + stretch})`;
    });
    const release = () => {
      if (!drag || drag.el !== dose) return;
      const moved = drag.moved, min = drag.min;
      drag = null;
      if (moved < 8) {                 // a tap, not a drag
        dose.style.transition = '';
        dose.style.transform = '';
        dose.style.zIndex = '';
        begin(min);
      } else {                          // bounce back into place
        dose.style.transition = 'transform 0.6s var(--spring)';
        dose.style.transform = '';
        setTimeout(() => { dose.style.transition = ''; dose.style.zIndex = ''; }, 620);
      }
    };
    dose.addEventListener('pointerup', release);
    dose.addEventListener('pointercancel', release);
  });

  const RADIUS = 100, CIRC = 2 * Math.PI * RADIUS;
  const ringFg = document.getElementById('ringFg');
  ringFg.style.strokeDasharray = CIRC;
  ringFg.style.strokeDashoffset = 0;

  const timeText = document.getElementById('timeText');
  const nowTask = document.getElementById('nowTask');
  const pauseBtn = document.getElementById('pauseBtn');
  const stopBtn = document.getElementById('stopBtn');
  const whisper = document.getElementById('whisper');

  const whispers = [
    "Just begin. Keep your hand moving.",
    "Small and ugly beats perfect and unstarted.",
    "You don't have to finish. Just continue.",
    "Momentum is built one minute at a time.",
    "Notice — it's lighter than you feared.",
    "Stay with it. You're already in motion.",
  ];

  let totalSec = 0, remaining = 0, tickId = null, paused = false, wIdx = 0, wId = null;

  function fmt(s) {
    const m = Math.floor(s / 60), sec = s % 60;
    return m + ':' + String(sec).padStart(2, '0');
  }
  function render() {
    timeText.textContent = fmt(remaining);
    const frac = totalSec === 0 ? 0 : remaining / totalSec;
    ringFg.style.strokeDashoffset = CIRC * (1 - frac);
  }
  function startTimer(seconds) {
    totalSec = seconds; remaining = seconds; paused = false;
    pauseBtn.textContent = 'Pause';
    render();
    clearInterval(tickId);
    tickId = setInterval(tick, 1000);
    cycleWhisper(true);
  }
  function tick() {
    if (paused) return;
    remaining -= 1;
    if (remaining <= 0) { remaining = 0; render(); finish(); return; }
    render();
  }
  function cycleWhisper(reset) {
    clearInterval(wId);
    if (reset) wIdx = 0;
    wId = setInterval(() => {
      whisper.style.opacity = 0;
      setTimeout(() => {
        wIdx = (wIdx + 1) % whispers.length;
        whisper.textContent = whispers[wIdx];
        whisper.style.opacity = 1;
      }, 400);
    }, 12000);
  }
  function finish() {
    clearInterval(tickId); clearInterval(wId);
    completeTask('You started.',
      "That was the hard part. The task was never as bad as your head made it. Want to keep the momentum?");
  }

  const runningEl = document.getElementById('running');

  function completeTask(title, sub) {
    document.getElementById('doneTitle').textContent = title;
    document.getElementById('doneSub').textContent = sub;
    chime();
    runningEl.classList.add('tossing');
    tossIntoPool(() => { runningEl.classList.remove('tossing'); show('done'); });
  }

  // fling the task chip down into the water, splash, then continue
  function tossIntoPool(done) {
    const hasTask = nowTask.style.display !== 'none' && nowTask.textContent.trim();
    if (!hasTask) {
      if (window.poolSplash) window.poolSplash(0.5, 0.82);
      setTimeout(done, 380);
      return;
    }
    const rect = nowTask.getBoundingClientRect();
    const clone = nowTask.cloneNode(true);
    Object.assign(clone.style, {
      position: 'fixed', left: rect.left + 'px', top: rect.top + 'px',
      width: rect.width + 'px', margin: '0', zIndex: '50', pointerEvents: 'none',
    });
    document.body.appendChild(clone);
    nowTask.style.visibility = 'hidden';

    const landX = rect.left + rect.width / 2;
    const landY = window.innerHeight * 0.84;
    const dy = landY - (rect.top + rect.height / 2);

    const anim = clone.animate([
      { transform: 'translate(0,0) rotate(0deg) scale(1)', opacity: 1 },
      { transform: `translate(6px, ${dy * 0.5}px) rotate(9deg) scale(0.88)`, opacity: 1, offset: 0.5 },
      { transform: `translate(0px, ${dy}px) rotate(24deg) scale(0.32)`, opacity: 0 },
    ], { duration: 880, easing: 'cubic-bezier(0.45, 0, 0.55, 1)' });

    setTimeout(() => {
      if (window.poolSplash) window.poolSplash(landX / window.innerWidth, landY / window.innerHeight);
    }, 740);

    anim.onfinish = () => {
      clone.remove();
      nowTask.style.visibility = '';
      done();
    };
  }

  function begin(min) {
    const task = taskInput.value.trim();
    nowTask.textContent = task;
    nowTask.style.display = task ? '' : 'none';
    whisper.textContent = whispers[0];
    whisper.style.opacity = 1;
    show('running');
    startTimer(min * 60);
  }
  pauseBtn.addEventListener('click', () => {
    paused = !paused;
    pauseBtn.textContent = paused ? 'Resume' : 'Pause';
    whisper.textContent = paused ? 'Paused. Pick it back up when ready.' : whispers[wIdx];
  });
  stopBtn.addEventListener('click', () => {
    clearInterval(tickId); clearInterval(wId);
    completeTask('You showed up.',
      "Stopping by choice is different from never starting. You broke the inertia — that counts.");
  });
  document.getElementById('moreBtn').addEventListener('click', () => {
    show('running');
    startTimer(5 * 60);
  });
  document.getElementById('resetBtn').addEventListener('click', () => {
    clearInterval(tickId); clearInterval(wId);
    taskInput.value = '';
    show('setup');
    taskInput.focus();
  });

  let audioCtx = null; // reuse one context across completions (avoids leaking contexts)
  function chime() {
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      if (!audioCtx) audioCtx = new Ctx();
      const ctx = audioCtx;
      if (ctx.state === 'suspended') ctx.resume();
      [523.25, 659.25, 783.99].forEach((f, i) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'sine'; o.frequency.value = f;
        const t = ctx.currentTime + i * 0.14;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.18, t + 0.04);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.9);
        o.connect(g).connect(ctx.destination);
        o.start(t); o.stop(t + 1);
      });
    } catch (e) {}
  }

  taskInput.focus();
})();
</script>
